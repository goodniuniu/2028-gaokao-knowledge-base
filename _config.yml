# 这是Jekyll的配置文件，用于GitHub Pages渲染
# 使用默认主题，支持Markdown文件直接渲染

# 站点设置
title: "2028高考知识库"
description: "2028年广东新高考六科学习知识库 - 数学/语文/英语/物理/化学/生物"

# 构建设置
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# 排除文件
exclude:
  - "*.png"
  - "*.jpg"
  - "*.pdf"

# 允许访问子目录中的Markdown文件
include:
  - "数学/"
  - "语文/"
  - "英语/"
  - "物理/"
  - "化学/"
  - "生物/"
  - "方法/"
  - "复盘追踪/"
