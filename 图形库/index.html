<style>
  body {
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
    background: #f5f7fa;
    line-height: 1.8;
    color: #333;
  }
  h1 {
    color: #1a5276;
    text-align: center;
    font-size: 26pt;
    margin-bottom: 10px;
  }
  .subtitle {
    text-align: center;
    color: #5d6d7e;
    font-size: 12pt;
    margin-bottom: 30px;
  }
  .back {
    display: inline-block;
    margin-bottom: 20px;
    padding: 8px 16px;
    background: #3498db;
    color: white;
    text-decoration: none;
    border-radius: 4px;
  }
  .back:hover { background: #2980b9; }
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
  }
  .card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
  }
  .card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    display: block;
    border-bottom: 1px solid #eee;
  }
  .card-title {
    padding: 12px 15px 4px;
    font-size: 12pt;
    font-weight: bold;
    color: #2c3e50;
    word-break: break-all;
  }
  .card-subject {
    padding: 0 15px 12px;
    font-size: 10pt;
    color: #e74c3c;
  }
  .footer {
    text-align: center;
    margin-top: 40px;
    padding: 20px;
    color: #7f8c8d;
    font-size: 10pt;
  }
  /* 响应式 */
  @media (max-width: 600px) {
    body { padding: 12px; }
    h1 { font-size: 20pt; }
    .gallery { grid-template-columns: 1fr; }
    .card img { height: 220px; }
  }
  @media (min-width: 601px) and (max-width: 900px) {
    .gallery { grid-template-columns: repeat(2, 1fr); }
  }
  @media (min-width: 901px) {
    .gallery { grid-template-columns: repeat(4, 1fr); }
  }
</style>
</head>
